<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Booking | Home</title>

<link rel="stylesheet" href="mystyle.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

<nav>
    <div class="nav-container">
        <h1 class="font-bold text-lg">Lab Booking</h1>
        <div id="nav-controls" class="hidden-ui flex gap-2">
            <button onclick="switchView('search-section')" class="btn btn-primary text-xs">Book Now</button>
            <button onclick="switchView('my-bookings-section')" class="btn btn-primary text-xs">History</button>
            <button id="admin-portal-btn" onclick="window.location.href='admin.html'" class="btn btn-admin text-xs hidden-ui">Admin Portal</button>
            <button onclick="logoutUser()" class="btn btn-danger text-xs">Logout</button>
        </div>
    </div>
</nav>

<main class="container mx-auto p-4 max-w-5xl">

<section id="login-section" class="content-section active mt-12">
    <div class="card max-w-sm mx-auto">
        <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
        <div class="space-y-4">
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Password">
            <button onclick="loginUser()" class="btn btn-primary w-full">Sign In</button>
        </div>
    </div>
</section>

<section id="search-section" class="content-section"></section>
<section id="my-bookings-section" class="content-section"></section>

</main>

<script>
const SUPABASE_URL = 'https://naptcmmrazrvpukrefxe.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_sqns8O_0Wjdo-oW46m83Pw_fulPTNhe';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* 🔐 FORCE LOGIN SCREEN ON EVERY LOAD */
window.onload = () => {
    localStorage.removeItem('currentUser');
};

/* LOGIN */
async function loginUser() {
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-password').value;

    const msgUint8 = new TextEncoder().encode(pass);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
    const hashed = Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');

    const { data } = await supabaseClient
        .from('users')
        .select('id,name,is_admin')
        .eq('email', email)
        .eq('password', hashed)
        .single();

    if (!data) {
        alert("Invalid Login");
        return;
    }

    localStorage.setItem('currentUser', JSON.stringify(data));
    showInterface(data);
}

function showInterface(user) {
    document.getElementById('login-section').classList.remove('active');
    document.getElementById('nav-controls').classList.remove('hidden-ui');

    if (user.is_admin)
        document.getElementById('admin-portal-btn').classList.remove('hidden-ui');
}

function logoutUser() {
    localStorage.removeItem('currentUser');
    location.reload();
}
</script>

</body>
</html>
