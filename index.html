<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Booking System | Glass Edition</title>
    <link rel="stylesheet" href="mystyle.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="nav-container">
            <h1 class="text-xl font-bold tracking-tight">Lab Booking</h1>
            <div id="nav-controls" class="hidden-ui flex flex-wrap gap-2 justify-center">
                <button onclick="switchView('search-section')" class="btn btn-primary">Book Now</button>
                <button onclick="switchView('my-bookings-section')" class="btn btn-primary">My History</button>
                <button id="admin-portal-btn" onclick="window.location.href='admin.html'" class="btn btn-admin hidden-ui">Admin Portal</button>
                <button onclick="logoutUser()" class="btn btn-danger">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-5xl">
        <section id="login-section" class="content-section active">
            <div class="card max-w-md mx-auto mt-10">
                <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
                <div class="space-y-4">
                    <input type="email" id="login-email" placeholder="Email Address">
                    <input type="password" id="login-pw" placeholder="Password">
                    <button onclick="loginUser()" class="btn btn-primary w-full">Sign In</button>
                </div>
            </div>
        </section>

        <section id="search-section" class="content-section">
            <div class="card">
                <h2 class="text-xl font-bold mb-4">Find Available Slots</h2>
                <div class="filter-group">
                    <div>
                        <label>Date</label>
                        <input type="date" id="booking-date" onchange="fetchAvailability()">
                    </div>
                    <div>
                        <label>Lab Facility</label>
                        <select id="lab-select" onchange="fetchAvailability()">
                            <option value="all">All Labs</option>
                        </select>
                    </div>
                    <button onclick="fetchAvailability()" class="btn btn-primary">Check Availability</button>
                </div>

                <div class="table-responsive mt-6">
                    <table class="w-full">
                        <thead id="grid-header"></thead>
                        <tbody id="grid-body"></tbody>
                    </table>
                    <div id="grid-placeholder" class="text-center p-10 opacity-50">
                        Select a date to begin.
                    </div>
                </div>
            </div>
        </section>

        <section id="my-bookings-section" class="content-section">
            <div class="card">
                <h2 class="text-xl font-bold mb-4">My Booking History</h2>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Lab</th>
                                <th>Time</th>
                                <th>Status</th>
                                <th class="text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="user-bookings-list"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div id="booking-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center z-[200]">
        <div class="card w-full max-w-md mx-4">
            <h2 class="text-xl font-bold mb-2">Confirm Booking</h2>
            <p id="modal-details-text" class="text-sm text-slate-600 mb-4 font-mono bg-slate-100 p-2 rounded"></p>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Purpose / Subject</label>
                    <input type="text" id="purpose" placeholder="e.g. Database Workshop">
                </div>
                <div class="flex gap-2">
                    <button onclick="submitBooking()" class="btn btn-primary flex-1">Confirm Request</button>
                    <button onclick="closeModal()" class="btn bg-slate-200 text-slate-700 flex-1">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://naptcmmrazrvpukrefxe.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_sqns8O_0Wjdo-oW46m83Pw_fulPTNhe';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const SLOTS = ["0800-0900", "0900-1000", "1000-1100", "1100-1200", "1200-1300", "1300-1400", "1400-1500", "1500-1600", "1600-1700", "1700-1800"];
        let currentBookingData = null;

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (user) setupUI(user);
            fetchLabDropdown();
        };

        async function fetchLabDropdown() {
            const { data } = await supabaseClient.from('labs').select('*').order('name');
            const select = document.getElementById('lab-select');
            data.forEach(l => {
                select.innerHTML += `<option value="${l.id}">${l.name}</option>`;
            });
        }

        async function loginUser() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pw').value;
            
            const msgUint8 = new TextEncoder().encode(pass);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashed = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');

            const { data, error } = await supabaseClient.from('users').select('*').eq('email', email).eq('password', hashed).single();

            if (data) {
                localStorage.setItem('currentUser', JSON.stringify(data));
                setupUI(data);
                switchView('search-section');
            } else {
                alert("Invalid credentials");
            }
        }

        function setupUI(user) {
            document.getElementById('login-section').classList.remove('active');
            document.getElementById('nav-controls').classList.remove('hidden-ui');
            if (user.is_admin) document.getElementById('admin-portal-btn').classList.remove('hidden-ui');
        }

        function logoutUser() {
            localStorage.clear();
            window.location.reload();
        }

        function switchView(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'my-bookings-section') fetchUserBookings();
        }

        async function fetchAvailability() {
            const date = document.getElementById('booking-date').value;
            const labFilter = document.getElementById('lab-select').value;
            if (!date) return;

            document.getElementById('grid-placeholder').classList.add('hidden');
            
            const labsQuery = supabaseClient.from('labs').select('*').order('name');
            if (labFilter !== 'all') labsQuery.eq('id', labFilter);
            const { data: labs } = await labsQuery;

            const { data: bookings } = await supabaseClient.from('bookings').select('*').eq('booking_date', date);

            // Render Header
            let headerHtml = `<tr><th>Slot</th>`;
            labs.forEach(l => headerHtml += `<th class="text-center">${l.name}</th>`);
            headerHtml += `</tr>`;
            document.getElementById('grid-header').innerHTML = headerHtml;

            // Render Body
            const user = JSON.parse(localStorage.getItem('currentUser'));
            let bodyHtml = "";
            SLOTS.forEach(slot => {
                bodyHtml += `<tr><td data-label="Time Slot" class="font-bold">${slot}</td>`;
                labs.forEach(lab => {
                    const b = bookings.find(i => i.lab_id === lab.id && i.time_slot === slot && i.status !== 'rejected');
                    let content = "";
                    if (b) {
                        const isMine = user && b.user_name === user.name;
                        const isAppr = b.status === 'approved';
                        const badge = isAppr ? (isMine ? "status-confirmed" : "status-occupied") : "status-pending";
                        const text = isAppr ? (isMine ? "Confirmed" : "Occupied") : "Pending";
                        content = `<span class="badge ${badge}">${text}</span>`;
                    } else {
                        content = `<button onclick="openModal('${lab.id}', '${lab.name}', '${slot}')" class="btn btn-primary text-[10px] px-3 py-1">Book</button>`;
                    }
                    bodyHtml += `<td data-label="${lab.name}" class="text-center">${content}</td>`;
                });
                bodyHtml += `</tr>`;
            });
            document.getElementById('grid-body').innerHTML = bodyHtml;
        }

        function openModal(labId, labName, slot) {
            currentBookingData = { labId, slot };
            document.getElementById('modal-details-text').innerText = `${labName} | ${slot}`;
            document.getElementById('booking-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('booking-modal').classList.add('hidden');
        }

        async function submitBooking() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            const { error } = await supabaseClient.from('bookings').insert([{
                lab_id: currentBookingData.labId,
                booking_date: document.getElementById('booking-date').value,
                time_slot: currentBookingData.slot,
                user_name: user.name,
                purpose: document.getElementById('purpose').value,
                status: 'pending'
            }]);
            if (!error) {
                closeModal();
                fetchAvailability();
            }
        }

        async function fetchUserBookings() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            const { data } = await supabaseClient.from('bookings').select('*, labs(name)').eq('user_name', user.name).order('booking_date', {ascending: false});
            document.getElementById('user-bookings-list').innerHTML = data.map(b => `
                <tr>
                    <td data-label="Date">${b.booking_date}</td>
                    <td data-label="Lab">${b.labs?.name}</td>
                    <td data-label="Time">${b.time_slot}</td>
                    <td data-label="Status"><span class="badge ${b.status === 'approved' ? 'status-confirmed' : 'status-pending'}">${b.status}</span></td>
                    <td data-label="Action" class="text-right">
                        ${b.status === 'pending' ? `<button onclick="cancelBooking('${b.id}')" class="text-red-500 font-bold">Cancel</button>` : '-'}
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="5" class="text-center p-8 opacity-50">No bookings found</td></tr>';
        }

        async function cancelBooking(id) {
            if(confirm('Delete request?')) {
                await supabaseClient.from('bookings').delete().eq('id', id);
                fetchUserBookings();
            }
        }
    </script>
</body>
</html>
