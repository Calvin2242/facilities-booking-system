<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Booking | Home</title>
    <link rel="stylesheet" href="mystyle.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <nav>
        <div class="nav-container">
            <h1 class="font-bold text-lg">Lab Booking</h1>
            <div id="nav-controls" class="hidden-ui flex gap-2">
                <button onclick="switchView('search-section')" class="btn btn-primary text-xs">Book Now</button>
                <button onclick="switchView('my-bookings-section')" class="btn btn-primary text-xs">History</button>
                <button id="admin-portal-btn" onclick="window.location.href='admin.html'" class="btn btn-admin text-xs hidden-ui">Admin Portal</button>
                <button onclick="logoutUser()" class="btn btn-danger text-xs">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-5xl">
        <section id="login-section" class="content-section active mt-12">
            <div class="card max-w-sm mx-auto">
                <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
                <div class="space-y-4">
                    <input type="email" id="login-email" placeholder="Email">
                    <input type="password" id="login-password" placeholder="Password">
                    <button onclick="loginUser()" class="btn btn-primary w-full">Sign In</button>
                </div>
            </div>
        </section>

        <section id="search-section" class="content-section">
            <div class="card">
                <h2 class="section-title">📅 Flexible Lab Booking</h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">1. Select Date</label>
                        <input type="date" id="booking-date" class="mt-2" onchange="refreshBookingView()">
                    </div>

                    <div>
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">2. Select Time Slots (You can pick multiple)</label>
                        <div id="slot-selection-grid" class="slot-grid mt-2">
                            </div>
                    </div>

                    <div class="border-t border-slate-100 pt-6">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-4">3. Available Labs for Selected Period</label>
                        <div id="available-labs-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                            <div class="col-span-full text-center p-12 opacity-50 border-2 border-dashed border-slate-200 rounded-2xl">
                                Select a date and at least one time slot.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="my-bookings-section" class="content-section">
            <div class="card">
                <h2 class="text-xl font-bold mb-4">My Bookings</h2>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Date</th><th>Lab</th><th>Time</th><th>Status</th><th>Action</th></tr></thead>
                        <tbody id="user-bookings-list"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div id="booking-modal" class="hidden-ui fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-[200]">
        <div class="card w-full max-w-sm mx-4">
            <h3 class="text-xl font-bold mb-2">Confirm Request</h3>
            <div id="modal-details-text" class="bg-blue-50 p-3 rounded mb-4 text-xs font-bold text-blue-700"></div>
            <textarea id="purpose" placeholder="What is this for?" class="mb-4"></textarea>
            <input type="hidden" id="modal-lab-id">
            <div class="flex gap-2">
                <button onclick="submitBooking()" class="btn btn-primary flex-1">Confirm</button>
                <button onclick="closeModal()" class="btn bg-gray-200 flex-1">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://naptcmmrazrvpukrefxe.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_sqns8O_0Wjdo-oW46m83Pw_fulPTNhe';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const SLOTS = ["0800-0900", "0900-1000", "1000-1100", "1100-1200", "1200-1300", "1300-1400", "1400-1500", "1500-1600", "1600-1700", "1700-1800"];

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (user && user.email) {
                showInterface(user);
            } else {
                localStorage.removeItem('currentUser'); // Clear potential corrupt cache
                switchView('login-section');
            }
            populateLabFilter();
        };

        async function loginUser() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const msgUint8 = new TextEncoder().encode(pass);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashed = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            
            const { data } = await supabaseClient.from('users').select('*').eq('email', email).eq('password', hashed).single();
            if(data) { localStorage.setItem('currentUser', JSON.stringify(data)); showInterface(data); }
            else alert("Invalid Login");
        }

        function showInterface(user) {
            // Hide login, show nav and main content
            document.getElementById('login-section').classList.remove('active');
            document.getElementById('nav-controls').classList.remove('hidden-ui');
            if (user.is_admin) document.getElementById('admin-portal-btn').classList.remove('hidden-ui');
            switchView('search-section');
        }

        function switchView(id) {
            // Hide all sections, show the selected one
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'my-bookings-section') fetchUserBookings();
        }
        
        // Function to reset and show time slots when date changes
        async function updateTimeSlots() {
            const select = document.getElementById('time-slot-select');
            select.innerHTML = '<option value="">-- Choose Time --</option>';
            
            SLOTS.forEach(slot => {
                select.innerHTML += `<option value="${slot}">${slot}</option>`;
            });
            
            document.getElementById('available-labs-container').innerHTML = 
                `<div class="col-span-full text-center p-12 opacity-50">Now choose a time slot...</div>`;
        }

        let selectedSlots = [];

        // Initialize or Reset the View
        function refreshBookingView() {
            selectedSlots = [];
            renderSlotGrid();
            renderAvailableLabs();
        }

        function renderSlotGrid() {
            const grid = document.getElementById('slot-selection-grid');
            grid.innerHTML = SLOTS.map(slot => `
                <div class="slot-pill" id="pill-${slot}" onclick="toggleSlot('${slot}')">
                    ${slot}
                </div>
            `).join('');
        }

        function toggleSlot(slot) {
            const index = selectedSlots.indexOf(slot);
            if (index > -1) {
                selectedSlots.splice(index, 1);
                document.getElementById(`pill-${slot}`).classList.remove('selected');
            } else {
                selectedSlots.push(slot);
                document.getElementById(`pill-${slot}`).classList.add('selected');
            }
            renderAvailableLabs();
        }

        async function renderAvailableLabs() {
            const date = document.getElementById('booking-date').value;
            const container = document.getElementById('available-labs-container');

            if (!date || selectedSlots.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center p-12 opacity-50">Select date and time slots...</div>`;
                return;
            }

            // 1. Fetch all labs and all bookings for that date
            const [{ data: labs }, { data: allBookings }] = await Promise.all([
                supabaseClient.from('labs').select('*').order('name'),
                supabaseClient.from('bookings').select('lab_id, time_slot').eq('booking_date', date).neq('status', 'rejected')
            ]);

            let html = "";
            
            labs.forEach(lab => {
                // Check if the lab is booked in ANY of the selected slots
                const conflictingBookings = allBookings.filter(b => 
                    b.lab_id === lab.id && selectedSlots.includes(b.time_slot)
                );

                const isUnavailable = conflictingBookings.length > 0;

                html += `
                    <div class="card !mb-0 flex flex-col justify-between transition-all ${isUnavailable ? 'opacity-50 grayscale' : 'border-l-4 border-l-blue-600 shadow-sm'}">
                        <div class="mb-4">
                            <span class="text-[10px] font-bold ${isUnavailable ? 'text-red-500' : 'text-green-600'} uppercase">
                                ${isUnavailable ? '● Conflicts Found' : '● Fully Available'}
                            </span>
                            <h3 class="font-bold text-lg text-slate-800 mt-1">${lab.name}</h3>
                            <p class="text-xs text-slate-500">${selectedSlots.length} slot(s) selected</p>
                        </div>
                        ${isUnavailable ? 
                            `<button class="btn bg-slate-100 text-slate-400 cursor-not-allowed w-full" disabled>Not Available</button>` : 
                            `<button onclick="confirmMultiBooking('${lab.id}', '${lab.name}')" class="btn btn-primary w-full">Book All Slots</button>`
                        }
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        async function confirmMultiBooking(labId, labName) {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            const date = document.getElementById('booking-date').value;
            
            // Sort slots to keep them in order
            const sortedSlots = [...selectedSlots].sort();
            
            if(!confirm(`Book ${labName} for ${sortedSlots.length} slots on ${date}?`)) return;

            // Create a booking record for EACH selected slot
            const bookingsToInsert = sortedSlots.map(slot => ({
                lab_id: labId,
                booking_date: date,
                time_slot: slot,
                user_name: user.name,
                status: 'pending',
                purpose: "Multi-slot Booking"
            }));

            const { error } = await supabaseClient.from('bookings').insert(bookingsToInsert);
            
            if (!error) {
                alert("Booking requests submitted!");
                refreshBookingView();
            } else {
                alert("Error submitting booking.");
            }
        }

        function openModal(id, name, slot) {
            document.getElementById('modal-lab-id').value = id;
            document.getElementById('modal-details-text').innerText = `${name} | ${slot}`;
            document.getElementById('booking-modal').classList.remove('hidden-ui');
        }

        function closeModal() { document.getElementById('booking-modal').classList.add('hidden-ui'); }
                    
        async function submitBooking() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            await supabaseClient.from('bookings').insert([{
                lab_id: document.getElementById('modal-lab-id').value,
                booking_date: document.getElementById('booking-date').value,
                time_slot: document.getElementById('modal-details-text').innerText.split(' | ')[1],
                user_name: user.name, status: 'pending', purpose: document.getElementById('purpose').value
            }]);
            closeModal(); fetchAvailability();
        }

        async function fetchUserBookings() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            const { data } = await supabaseClient.from('bookings').select('*, labs(name)').eq('user_name', user.name).order('booking_date', {ascending:false});
            document.getElementById('user-bookings-list').innerHTML = data.map(b => `
                <tr>
                    <td data-label="Date">${b.booking_date}</td>
                    <td data-label="Lab">${b.labs?.name}</td>
                    <td data-label="Time">${b.time_slot}</td>
                    <td data-label="Status"><span class="badge ${b.status === 'approved' ? 'status-confirmed' : 'status-pending'}">${b.status}</span></td>
                    <td data-label="Action" class="text-right">${b.status === 'pending' ? `<button onclick="cancelBooking('${b.id}')" class="text-red-500 font-bold">Cancel</button>` : '-'}</td>
                </tr>
            `).join('') || '<tr><td colspan="5" class="text-center p-8 opacity-50">No history found</td></tr>';
        }

        async function cancelBooking(id) {
            if(confirm('Cancel this request?')) { await supabaseClient.from('bookings').delete().eq('id', id); fetchUserBookings(); }
        }

        function logoutUser() { localStorage.clear(); window.location.reload(); }
    </script>
</body>
</html>
