<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Lab Booking System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
    </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

    <nav class="bg-blue-900 p-4 shadow-md text-white">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">Counseling Lab Booking</h1>
            <div id="auth-status" class="text-sm bg-blue-800 px-3 py-1 rounded">Connecting...</div>
            <button onclick="goToAdmin()" class="bg-blue-700 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm">View Admin</button>
        </div>
    </nav>

    <main class="container mx-auto my-8 p-4">
        <div class="bg-white rounded-lg shadow-sm p-6 mb-8 grid md:grid-cols-2 gap-6">
            <div>
                <h2 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2">1. Select Date</h2>
                <div class="flex items-end gap-4">
                    <div class="flex-grow">
                        <input type="date" id="booking-date" class="w-full bg-gray-50 border border-gray-300 rounded px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <button onclick="fetchAvailability()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition">
                        Check
                    </button>
                </div>
            </div>
            
            <div>
                <h2 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2">Legend</h2>
                <div class="flex flex-wrap gap-4 text-xs font-bold uppercase">
                    <div class="flex items-center"><span class="w-3 h-3 bg-blue-50 border border-blue-200 mr-2"></span> Available</div>
                    <div class="flex items-center"><span class="w-3 h-3 bg-yellow-100 border border-yellow-200 mr-2"></span> Pending</div>
                    <div class="flex items-center"><span class="w-3 h-3 bg-red-100 border border-red-200 mr-2"></span> Occupied</div>
                    <div class="flex items-center"><span class="w-3 h-3 bg-gray-200 border border-gray-300 mr-2"></span> Maintenance</div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-sm overflow-hidden">
            <div id="grid-container" class="overflow-x-auto">
                <div class="p-10 text-center text-gray-400">
                    <p>Please select a date above to view the lab schedule.</p>
                </div>
            </div>
        </div>
    </main>

    <div id="booking-modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-50">
        <div class="modal-overlay absolute w-full h-full bg-gray-900 opacity-50" onclick="closeModal()"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded shadow-lg z-50 overflow-y-auto">
            <div class="modal-content py-4 text-left px-6">
                <div class="flex justify-between items-center pb-3 border-b">
                    <p class="text-2xl font-bold text-blue-900">Request Booking</p>
                    <button onclick="closeModal()" class="text-black text-2xl hover:text-gray-500">&times;</button>
                </div>
                <form id="booking-form" class="mt-4 space-y-4">
                    <input type="hidden" id="modal-lab-id">
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-1">Lab & Time</label>
                        <p id="modal-details-text" class="text-gray-600 italic text-sm"></p>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-1">Your Full Name</label>
                        <input type="text" id="user-name" required class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-blue-400 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-bold mb-1">Purpose</label>
                        <textarea id="purpose" required class="w-full border rounded px-3 py-2 focus:ring-2 focus:ring-blue-400 outline-none" rows="3"></textarea>
                    </div>
                    <div class="flex justify-end pt-2">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded mr-2 hover:bg-gray-300">Cancel</button>
                        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">Submit Request</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const SUPABASE_URL = 'https://naptcmmrazrvpukrefxe.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_sqns8O_0Wjdo-oW46m83Pw_fulPTNhe';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const SLOTS = ["0800-0900", "0900-1000", "1000-1100", "1100-1200", "1200-1300", "1300-1400", "1400-1500", "1500-1600", "1600-1700", "1700-1800"];

        // --- 2. FETCH & RENDER ---
        async function fetchAvailability() {
            const date = document.getElementById('booking-date').value;
            if (!date) return alert('Please select a date!');

            const container = document.getElementById('grid-container');
            container.innerHTML = '<div class="p-10 text-center"><span class="animate-pulse text-blue-600 font-bold">Syncing with Live Database...</span></div>';

            try {
                // Fetch ALL labs (including inactive ones for maintenance display) 
                // and bookings for the chosen date
                const [labsRes, bookingsRes] = await Promise.all([
                    supabaseClient.from('labs').select('*').order('name'),
                    supabaseClient.from('bookings').select('*').eq('booking_date', date)
                ]);

                if (labsRes.error) throw labsRes.error;
                const labs = labsRes.data;
                const bookings = bookingsRes.data || [];

                let html = `<table class="w-full text-left border-collapse min-w-[800px]">
                    <thead><tr class="bg-gray-50 border-b">
                        <th class="p-4 border-r font-bold text-gray-600 sticky left-0 bg-gray-50 z-10 w-32">Time / Lab</th>`;
                
                labs.forEach(lab => {
                    html += `<th class="p-4 text-center font-bold text-gray-600 border-r text-xs uppercase">${lab.name}</th>`;
                });
                html += `</tr></thead><tbody>`;

                SLOTS.forEach(slot => {
                    html += `<tr class="border-b hover:bg-gray-50 transition">
                        <td class="p-4 font-bold text-gray-700 border-r bg-gray-50 sticky left-0 z-10">${slot}</td>`;
                    
                    labs.forEach(lab => {
                        // 1. Check Maintenance Status First
                        if (lab.is_active === false) {
                            html += `<td class="p-2 text-center border-r bg-gray-100">
                                <span class="text-[9px] font-bold text-gray-400 uppercase">Maintenance</span>
                            </td>`;
                            return;
                        }

                        // 2. Check for Bookings
                        const b = bookings.find(item => item.lab_id === lab.id && item.time_slot === slot);
                        
                        if (b) {
                            const isApproved = b.status === 'approved';
                            html += `<td class="p-2 text-center border-r">
                                <span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${isApproved ? 'bg-red-100 text-red-600' : 'bg-yellow-100 text-yellow-700'}">
                                    ${isApproved ? 'Occupied' : 'Pending'}
                                </span>
                            </td>`;
                        } else {
                            html += `<td class="p-2 text-center border-r">
                                <button onclick="openModal('${lab.id}', '${lab.name}', '${slot}')" class="text-[10px] bg-blue-50 text-blue-600 px-3 py-1 rounded font-bold hover:bg-blue-600 hover:text-white transition-all uppercase">
                                    Book
                                </button>
                            </td>`;
                        }
                    });
                    html += `</tr>`;
                });

                html += `</tbody></table>`;
                container.innerHTML = html;
                document.getElementById('auth-status').textContent = 'System Online';

            } catch (err) {
                console.error(err);
                container.innerHTML = `<p class="p-10 text-red-500 text-center font-bold">Sync Error: ${err.message}</p>`;
            }
        }

        // --- 3. MODAL LOGIC ---
        function openModal(id, name, slot) {
            document.getElementById('modal-lab-id').value = id;
            document.getElementById('modal-details-text').innerText = `${name} | ${slot}`;
            document.getElementById('booking-modal').classList.remove('opacity-0', 'pointer-events-none');
            document.body.classList.add('modal-active');
        }

        function closeModal() {
            document.getElementById('booking-modal').classList.add('opacity-0', 'pointer-events-none');
            document.body.classList.remove('modal-active');
            document.getElementById('booking-form').reset();
        }

        // --- 4. SUBMISSION ---
        document.getElementById('booking-form').onsubmit = async (e) => {
            e.preventDefault();
            const lab_id = document.getElementById('modal-lab-id').value;
            const date = document.getElementById('booking-date').value;
            const time_slot = document.getElementById('modal-details-text').innerText.split(' | ')[1];
            
            const { error } = await supabaseClient.from('bookings').insert([{
                lab_id: lab_id,
                booking_date: date,
                time_slot: time_slot,
                user_name: document.getElementById('user-name').value,
                purpose: document.getElementById('purpose').value,
                status: 'pending' 
            }]);

            if (error) {
                alert("Submission failed: " + error.message);
            } else {
                alert("Request Sent! The admin will review your booking.");
                closeModal();
                fetchAvailability();
            }
        };

        // --- 5. ADMIN PAGE NAVIGATION --- TEMPORARY FOR DEV AND TESTING ONLY
        function goToAdmin() {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
