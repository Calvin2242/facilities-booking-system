<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Lab Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-red-800 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Admin Control Panel</h1>
            <a href="index.html" class="text-sm bg-red-700 px-3 py-1 rounded hover:bg-red-600">Back to User View</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <section class="lg:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-yellow-500">
                <h2 class="text-xl font-bold mb-4 flex items-center">
                    <span class="mr-2">📥</span> Pending Approvals
                </h2>
                <div id="pending-list" class="space-y-4">
                    <p class="text-gray-400 italic">Checking for new requests...</p>
                </div>
            </div>
        </section>

        <section class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-500">
                <h2 class="text-xl font-bold mb-4 flex items-center">
                    <span class="mr-2">🔬</span> Lab Management
                </h2>
                
                <div class="bg-gray-50 p-4 rounded-lg border mb-6">
                    <h3 class="font-bold text-sm mb-3 text-gray-600 uppercase">Register New Facility</h3>
                    <div class="space-y-3">
                        <input type="text" id="new-lab-name" placeholder="Name (e.g. Makmal Latihan 1A)" class="w-full border p-2 rounded text-sm">
                        <select id="new-lab-type" class="w-full border p-2 rounded text-sm bg-white">
                            <option value="Individu">Individu (1-on-1)</option>
                            <option value="Kelompok">Kelompok (Group)</option>
                            <option value="Tutorial">Tutorial</option>
                        </select>
                        <button onclick="addNewLab()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded text-sm transition">
                            Add Facility
                        </button>
                    </div>
                </div>

                <h3 class="font-bold text-sm mb-2 text-gray-600 uppercase">Existing Facilities</h3>
                <div id="labs-list" class="space-y-3">
                    </div>
            </div>
        </section>

    </main>

    <script>
    // --- 1. CONFIGURATION ---
    const SUPABASE_URL = 'https://naptcmmrazrvpukrefxe.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_sqns8O_0Wjdo-oW46m83Pw_fulPTNhe';
    
    // Changed name from 'supabase' to 'supabaseClient' to avoid the redeclaration error
    let supabaseClient;

    // --- 2. INITIALIZATION ---
    function init() {
        try {
            // Use the library's createClient method
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log("Supabase Client initialized.");
            fetchPending();
            fetchLabs();
        } catch (err) {
            console.error("Initialization Error:", err);
        }
    }

    // --- 3. GLOBAL FUNCTIONS ---
    // Attaching directly to 'window' so HTML onclick can always find them
    
    window.addNewLab = async function() {
    const nameField = document.getElementById('new-lab-name');
    const typeField = document.getElementById('new-lab-type');
    
    const name = nameField.value.trim();
    // Fallback to 'Individu' if no selection is detected
    const type = typeField.value || 'Individu'; 

    if (!name) return alert("Please enter a lab name!");

    const { error } = await supabaseClient.from('labs').insert([{ 
        name: name, 
        type: type, 
        is_active: true 
    }]);

    if (error) {
        alert('Error: ' + error.message);
    } else {
        nameField.value = '';
        fetchLabs();
    }
};

    window.updateStatus = async function(id, newStatus) {
        console.log('updateStatus called', { id, newStatus, supabaseClient });
        if (!supabaseClient) {
            alert('Supabase client not initialized');
            return;
        }
        const { data, error } = await supabaseClient
            .from('bookings')
            .update({ status: newStatus })
            .eq('id', id);
        if (error) {
            console.error('updateStatus error', error);
            alert("Error updating status: " + error.message);
        } else {
            console.log('updateStatus success', data);
            fetchPending();
        }
    };

    window.toggleLab = async function(id, currentStatus) {
        const { error } = await supabaseClient.from('labs').update({ is_active: !currentStatus }).eq('id', id);
        if (error) alert(error.message);
        else fetchLabs();
    };

    window.deleteLab = async function(id) {
        if (!confirm("Delete this facility permanently?")) return;
        const { error } = await supabaseClient.from('labs').delete().eq('id', id);
        if (error) alert("Error: " + error.message);
        else fetchLabs();
    };

    async function fetchPending() {
        const { data, error } = await supabaseClient
            .from('bookings')
            .select('*, labs(name)')
            .eq('status', 'pending')
            .order('created_at', { ascending: true });

        console.log('fetchPending result', { data, error });
        const container = document.getElementById('pending-list');
        if (error || !data) {
            container.innerHTML = `<p class="text-red-500">Error loading data. See console for details.</p>`;
            return;
        }

        if (data.length === 0) {
            container.innerHTML = '<p class="text-gray-400 italic">No pending requests.</p>';
            return;
        }

        container.innerHTML = data.map(req => `
            <div class="border p-4 rounded-lg bg-gray-50 flex justify-between items-center shadow-sm">
                <div>
                    <div class="font-bold text-blue-900">${req.labs?.name || 'Lab'}</div>
                    <div class="text-sm text-gray-600">${req.booking_date} | ${req.time_slot}</div>
                    <div class="text-xs text-gray-500 mt-1 uppercase font-bold">User: ${req.user_name}</div>
                </div>
                <div class="flex flex-col gap-2">
                    <button onclick="updateStatus('${req.id}', 'approved')" class="bg-green-600 text-white px-4 py-1.5 rounded text-xs font-bold hover:bg-green-700">Approve</button>
                    <button onclick="updateStatus('${req.id}', 'rejected')" class="bg-red-600 text-white px-4 py-1.5 rounded text-xs font-bold hover:bg-red-700">Reject</button>
                </div>
            </div>
        `).join('');
    }

    async function fetchLabs() {
        const { data, error } = await supabaseClient.from('labs').select('*').order('name');
        const container = document.getElementById('labs-list');
        if (error || !data) return;

        container.innerHTML = data.map(lab => `
            <div class="flex items-center justify-between p-3 border rounded shadow-sm bg-white">
                <div>
                    <div class="text-sm font-bold">${lab.name}</div>
                    <div class="text-[10px] text-blue-600 font-bold uppercase">${lab.type || 'Individu'}</div>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleLab('${lab.id}', ${lab.is_active})" class="text-[9px] px-2 py-1 rounded border font-bold ${lab.is_active ? 'bg-orange-50 text-orange-600' : 'bg-green-50 text-green-600'}">
                        ${lab.is_active ? 'MAINTENANCE' : 'RESTORE'}
                    </button>
                    <button onclick="deleteLab('${lab.id}')" class="text-[9px] px-2 py-1 rounded border bg-red-50 text-red-600 font-bold">DELETE</button>
                </div>
            </div>
        `).join('');
    }

    // Start everything when the window is loaded
    window.onload = init;
</script>
</body>
</html>
