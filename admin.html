<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Glass Edition</title>
    <link rel="stylesheet" href="mystyle.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="nav-container">
            <h1 class="text-xl font-bold">Admin Portal</h1>
            <div class="flex flex-wrap gap-2 justify-center">
                <button onclick="switchView('requests-section')" class="btn btn-admin">Requests</button>
                <button onclick="switchView('users-section')" class="btn btn-admin">Users</button>
                <button onclick="switchView('labs-section')" class="btn btn-admin">Labs</button>
                <button onclick="logoutUser()" class="btn btn-admin">Logout</button>
                <button onclick="window.location.href='index.html'" class="btn btn-primary">User View</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-6xl">
        <section id="requests-section" class="content-section active">
            <div class="card">
                <h2 class="text-xl font-bold mb-4 text-blue-900">📥 Pending Approvals</h2>
                <div class="filter-group">
                    <div><label>Date</label><input type="date" id="filter-pending-date" oninput="renderFilteredBookings()"></div>
                    <div><label>Lab</label><select id="filter-pending-lab" onchange="renderFilteredBookings()"></select></div>
                    <button onclick="clearFilters('pending')" class="btn bg-slate-400 text-white text-xs">Clear</button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Details</th><th>User</th><th>Purpose</th><th>Action</th></tr></thead>
                        <tbody id="pending-list"></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h2 class="text-xl font-bold mb-4 text-slate-600">📚 History Archive</h2>
                <div class="filter-group">
                    <div><label>Date</label><input type="date" id="filter-archive-date" oninput="renderFilteredBookings()"></div>
                    <div><label>Lab</label><select id="filter-archive-lab" onchange="renderFilteredBookings()"></select></div>
                    <button onclick="clearFilters('archive')" class="btn bg-slate-400 text-white text-xs">Clear</button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Details</th><th>User</th><th>Status</th><th>Edit</th></tr></thead>
                        <tbody id="history-list"></tbody>
                    </table>
                </div>
            </div>
        </section>

        </main>

    <script>
        const SUPABASE_URL = 'https://naptcmmrazrvpukrefxe.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_sqns8O_0Wjdo-oW46m83Pw_fulPTNhe';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let allBookingsCache = [];

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user?.is_admin) window.location.href = 'index.html';
            fetchAllData();
        };

        async function fetchAllData() {
            await fetchLabs();
            fetchUsers();
            fetchBookings();
        }

        async function fetchLabs() {
            const { data } = await supabaseClient.from('labs').select('*').order('name');
            const pSel = document.getElementById('filter-pending-lab');
            const aSel = document.getElementById('filter-archive-lab');
            pSel.innerHTML = aSel.innerHTML = '<option value="all">All Labs</option>';
            data.forEach(l => {
                const opt = `<option value="${l.name}">${l.name}</option>`;
                pSel.innerHTML += opt; aSel.innerHTML += opt;
            });
        }

        async function fetchBookings() {
            const { data } = await supabaseClient.from('bookings').select('*, labs(name)').order('booking_date', {ascending: false});
            allBookingsCache = data || [];
            renderFilteredBookings();
        }

        function logoutUser() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        function clearFilters(type) {
            document.getElementById(`filter-${type}-date`).value = '';
            document.getElementById(`filter-${type}-lab`).value = 'all';
            renderFilteredBookings();
        }

        function renderFilteredBookings() {
            const pD = document.getElementById('filter-pending-date').value;
            const pL = document.getElementById('filter-pending-lab').value;
            const aD = document.getElementById('filter-archive-date').value;
            const aL = document.getElementById('filter-archive-lab').value;

            const pending = allBookingsCache.filter(b => b.status === 'pending' && (!pD || b.booking_date === pD) && (pL === 'all' || b.labs?.name === pL));
            const history = allBookingsCache.filter(b => b.status !== 'pending' && (!aD || b.booking_date === aD) && (aL === 'all' || b.labs?.name === aL));

            document.getElementById('pending-list').innerHTML = pending.map(b => `
                <tr>
                    <td data-label="Details"><b>${b.booking_date}</b><br><small class="text-blue-600 uppercase font-bold text-[9px]">${b.labs?.name} | ${b.time_slot}</small></td>
                    <td data-label="User">${b.user_name}</td>
                    <td data-label="Purpose" class="text-xs italic text-gray-500">${b.purpose || '-'}</td>
                    <td data-label="Action" class="text-right">
                        <button onclick="updateStatus('${b.id}', 'approved')" class="btn bg-green-500 text-white text-[10px] px-2 py-1 mr-1">Approve</button>
                        <button onclick="updateStatus('${b.id}', 'rejected')" class="btn bg-red-500 text-white text-[10px] px-2 py-1">Reject</button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="4" class="text-center p-8 opacity-50">No pending requests</td></tr>';

            document.getElementById('history-list').innerHTML = history.map(b => `
                <tr class="opacity-80">
                    <td data-label="Details">${b.booking_date}<br><small>${b.labs?.name}</small></td>
                    <td data-label="User">${b.user_name}</td>
                    <td data-label="Status"><span class="badge ${b.status === 'approved' ? 'status-confirmed' : 'status-occupied'}">${b.status}</span></td>
                    <td data-label="Edit" class="text-right"><button onclick="updateStatus('${b.id}', 'pending')" class="text-blue-500 text-xs font-bold underline">Reset</button></td>
                </tr>
            `).join('') || '<tr><td colspan="4" class="text-center p-8 opacity-50">History empty</td></tr>';
        }

        async function updateStatus(id, status) {
            await supabaseClient.from('bookings').update({ status }).eq('id', id);
            fetchBookings();
        }

        function switchView(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
