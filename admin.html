<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Lab Booking</title>
    <link rel="stylesheet" href="mystyle.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <nav>
        <div class="nav-container">
            <h1 class="text-xl font-bold">Admin Portal</h1>
            <div class="flex flex-wrap gap-2 justify-center">
                <button onclick="switchView('requests-section')" class="btn btn-admin">Requests</button>
                <button onclick="switchView('users-section')" class="btn btn-admin">Users</button>
                <button onclick="switchView('labs-section')" class="btn btn-admin">Labs</button>
                <button onclick="window.location.href='index.html'" class="btn btn-primary">User View</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-6xl">
        
        <section id="requests-section" class="content-section active">
            
            <div class="card border-t-4 border-amber-500 mb-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Inbox: Pending Approvals</h2>
                
                <div class="filter-group">
                    <div>
                        <label>Filter by Date</label>
                        <input type="date" id="filter-pending-date" oninput="renderFilteredBookings()">
                    </div>
                    <div>
                        <label>Filter by Lab</label>
                        <select id="filter-pending-lab" onchange="renderFilteredBookings()">
                            <option value="all">All Labs</option>
                        </select>
                    </div>
                    <button onclick="clearFilters('pending')" class="btn btn-clear">Clear</button>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Date/Lab</th>
                                <th>User</th>
                                <th>Purpose</th>
                                <th class="text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="pending-list"></tbody>
                    </table>
                </div>
            </div>

            <div class="card border-t-4 border-gray-400">
                <h2 class="text-lg font-bold text-gray-600 mb-4">Booking Archive</h2>
                
                <div class="filter-group">
                    <div>
                        <label>Filter by Date</label>
                        <input type="date" id="filter-archive-date" oninput="renderFilteredBookings()">
                    </div>
                    <div>
                        <label>Filter by Lab</label>
                        <select id="filter-archive-lab" onchange="renderFilteredBookings()">
                            <option value="all">All Labs</option>
                        </select>
                    </div>
                    <button onclick="clearFilters('archive')" class="btn btn-clear">Clear</button>
                </div>

                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Date/Lab</th>
                                <th>User</th>
                                <th>Status</th>
                                <th class="text-right">Edit</th>
                            </tr>
                        </thead>
                        <tbody id="history-list"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="users-section" class="content-section">
            <div class="card border-t-4 border-blue-600">
                <h2 class="text-xl font-bold mb-4">Register New User</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-8">
                    <input type="text" id="new-user-name" placeholder="Name">
                    <input type="email" id="new-user-email" placeholder="Email">
                    <input type="password" id="new-user-pw" placeholder="Password">
                    <button onclick="registerUser()" class="btn btn-primary">Add User</button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Name</th><th>Email</th><th class="text-right">Action</th></tr></thead>
                        <tbody id="users-list"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="labs-section" class="content-section">
            <div class="card border-t-4 border-purple-600">
                <h2 class="text-xl font-bold mb-4">Manage Lab Facilities</h2>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="new-lab-name" placeholder="Lab Name">
                    <button onclick="addLab()" class="btn btn-primary">Add Lab</button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Lab ID</th><th>Facility Name</th><th class="text-right">Action</th></tr></thead>
                        <tbody id="labs-list"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        const SUPABASE_URL = 'https://naptcmmrazrvpukrefxe.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_sqns8O_0Wjdo-oW46m83Pw_fulPTNhe';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let allBookingsCache = [];

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user || !user.is_admin) {
                alert("Unauthorized");
                window.location.href = 'index.html';
            }
            fetchAllData();
        };

        async function fetchAllData() {
            await fetchLabs(); 
            fetchUsers();
            fetchBookings();
        }

        async function fetchLabs() {
            const { data } = await supabaseClient.from('labs').select('*').order('name');
            const list = document.getElementById('labs-list');
            const pSelect = document.getElementById('filter-pending-lab');
            const aSelect = document.getElementById('filter-archive-lab');

            pSelect.innerHTML = aSelect.innerHTML = '<option value="all">All Labs</option>';

            list.innerHTML = data.map(l => {
                const opt = `<option value="${l.name}">${l.name}</option>`;
                pSelect.innerHTML += opt;
                aSelect.innerHTML += opt;
                return `<tr><td class="text-gray-400 text-xs font-mono">${l.id.substring(0,8)}</td><td class="font-bold">${l.name}</td><td class="text-right"><button onclick="deleteLab('${l.id}')" class="text-red-500 font-bold">Delete</button></td></tr>`;
            }).join('');
        }

        async function fetchBookings() {
            const { data } = await supabaseClient.from('bookings').select('*, labs(name)').order('created_at', {ascending: false});
            allBookingsCache = data || [];
            renderFilteredBookings();
        }

        function clearFilters(type) {
            if (type === 'pending') {
                document.getElementById('filter-pending-date').value = '';
                document.getElementById('filter-pending-lab').value = 'all';
            } else {
                document.getElementById('filter-archive-date').value = '';
                document.getElementById('filter-archive-lab').value = 'all';
            }
            renderFilteredBookings();
        }

        function renderFilteredBookings() {
            const pDate = document.getElementById('filter-pending-date').value;
            const pLab = document.getElementById('filter-pending-lab').value;
            const aDate = document.getElementById('filter-archive-date').value;
            const aLab = document.getElementById('filter-archive-lab').value;

            const pending = allBookingsCache.filter(b => {
                return b.status === 'pending' && (!pDate || b.booking_date === pDate) && (pLab === 'all' || b.labs?.name === pLab);
            });

            const history = allBookingsCache.filter(b => {
                return b.status !== 'pending' && (!aDate || b.booking_date === aDate) && (aLab === 'all' || b.labs?.name === aLab);
            });

            document.getElementById('pending-list').innerHTML = pending.length ? pending.map(b => `
                <tr>
                    <td><b>${b.booking_date}</b><br><small class="text-blue-600 font-bold text-[9px] uppercase">${b.labs?.name} | ${b.time_slot}</small></td>
                    <td>${b.user_name}</td>
                    <td class="text-xs italic text-gray-500">${b.purpose || '-'}</td>
                    <td class="text-right">
                        <button onclick="updateStatus('${b.id}', 'approved')" class="btn-success text-[10px] px-2 py-1 rounded">Approve</button>
                        <button onclick="updateStatus('${b.id}', 'rejected')" class="btn-danger text-[10px] px-2 py-1 rounded">Reject</button>
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="4" class="text-center p-4 text-gray-400">No matches</td></tr>';

            document.getElementById('history-list').innerHTML = history.length ? history.map(b => `
                <tr class="opacity-80">
                    <td>${b.booking_date}<br><small>${b.labs?.name}</small></td>
                    <td>${b.user_name}</td>
                    <td><span class="badge ${b.status === 'approved' ? 'status-confirmed' : 'status-occupied'}">${b.status}</span></td>
                    <td class="text-right"><button onclick="updateStatus('${b.id}', 'pending')" class="text-blue-500 text-xs font-bold underline">Reset</button></td>
                </tr>
            `).join('') : '<tr><td colspan="4" class="text-center p-4 text-gray-400">No history found</td></tr>';
        }

        async function updateStatus(id, status) {
            const { error } = await supabaseClient.from('bookings').update({ status }).eq('id', id);
            if(!error) fetchBookings();
        }

        function switchView(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function addLab() {
            const name = document.getElementById('new-lab-name').value;
            if(!name) return;
            const { error } = await supabaseClient.from('labs').insert([{ name }]);
            if(!error) { document.getElementById('new-lab-name').value = ''; fetchLabs(); }
        }

        async function deleteLab(id) {
            if(confirm('Remove Lab?')) {
                await supabaseClient.from('labs').delete().eq('id', id);
                fetchLabs();
            }
        }

        async function fetchUsers() {
            const { data } = await supabaseClient.from('users').select('*').order('name');
            document.getElementById('users-list').innerHTML = data.map(u => `
                <tr><td>${u.name} ${u.is_admin ? '<span class="text-[8px] bg-purple-100 text-purple-600 px-1 rounded">ADMIN</span>' : ''}</td><td>${u.email}</td><td class="text-right"><button onclick="deleteUser('${u.id}')" class="text-red-500 font-bold">Remove</button></td></tr>
            `).join('');
        }

        async function hashPassword(password) {
            const msgUint8 = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function registerUser() {
            const name = document.getElementById('new-user-name').value, email = document.getElementById('new-user-email').value, pass = document.getElementById('new-user-pw').value;
            if(!name || !email || !pass) return alert("Missing fields");
            const hashedPassword = await hashPassword(pass);
            const { error } = await supabaseClient.from('users').insert([{ name, email, password: hashedPassword, is_admin: false }]);
            if(!error) { alert("User Registered"); fetchUsers(); }
        }

        async function deleteUser(id) {
            if(confirm('Delete User?')) {
                await supabaseClient.from('users').delete().eq('id', id);
                fetchUsers();
            }
        }
    </script>
</body>
</html>
