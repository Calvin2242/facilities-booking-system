<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Lab Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-red-800 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Admin Control Panel</h1>
            <a href="index.html" class="text-sm bg-red-700 px-3 py-1 rounded hover:bg-red-600">Back to User View</a>
        </div>
    </nav>

    <main class="container mx-auto py-8 px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <section class="lg:col-span-2 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-yellow-500">
                <h2 class="text-xl font-bold mb-4 flex items-center">
                    <span class="mr-2">📥</span> Pending Approvals
                </h2>
                <div id="pending-list" class="space-y-4">
                    <p class="text-gray-400 italic">Checking for new requests...</p>
                </div>
            </div>
        </section>

        <section class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-500">
                <h2 class="text-xl font-bold mb-4 flex items-center">
                    <span class="mr-2">🔬</span> Lab Management
                </h2>
                <div id="labs-list" class="space-y-3 mb-4">
                    </div>
                <hr class="my-4">
                <h3 class="font-bold text-sm mb-2 text-gray-600">Add New Lab</h3>
                <div class="flex gap-2">
                    <input type="text" id="new-lab-name" placeholder="Lab Name" class="border p-2 rounded text-sm flex-grow">
                    <button onclick="addNewLab()" class="bg-green-600 text-white px-3 py-1 rounded text-sm">+</button>
                </div>
            </div>
        </section>

    </main>

    <script>
        const SUPABASE_URL = 'https://naptcmmrazrvpukrefxe.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_sqns8O_0Wjdo-oW46m83Pw_fulPTNhe';
        // note: anon key can only perform actions allowed by your row-level security policies.
        // if you haven't added an "allow insert" policy for "labs", anonymous clients
        // won't be able to create rows. The UI will show a helpful error above.
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function initAdmin() {
            fetchPending();
            fetchLabs();
        }

        // --- REQUEST MANAGEMENT ---
        async function fetchPending() {
            const { data, error } = await supabase
                .from('bookings')
                .select('*, labs(name)')
                .eq('status', 'pending')
                .order('created_at', { ascending: true });

            const container = document.getElementById('pending-list');
            if (data.length === 0) {
                container.innerHTML = '<p class="text-gray-400">All clear! No pending requests.</p>';
                return;
            }

            container.innerHTML = data.map(req => `
                <div class="border p-4 rounded-lg bg-gray-50 flex justify-between items-center">
                    <div>
                        <div class="font-bold text-blue-900">${req.labs.name}</div>
                        <div class="text-sm text-gray-600">${req.booking_date} | ${req.time_slot}</div>
                        <div class="text-xs text-gray-500 mt-1">Requested by: ${req.user_name}</div>
                        <div class="text-xs italic mt-1 font-medium">"${req.purpose}"</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="updateStatus('${req.id}', 'approved')" class="bg-green-600 text-white px-3 py-1 rounded text-xs hover:bg-green-700">Approve</button>
                        <button onclick="updateStatus('${req.id}', 'rejected')" class="bg-red-600 text-white px-3 py-1 rounded text-xs hover:bg-red-700">Reject</button>
                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(id, newStatus) {
            const { error } = await supabase.from('bookings').update({ status: newStatus }).eq('id', id);
            if (!error) fetchPending();
        }

        // --- LAB MANAGEMENT ---
        async function fetchLabs() {
            const { data } = await supabase.from('labs').select('*').order('name');
            const container = document.getElementById('labs-list');
            
            container.innerHTML = data.map(lab => `
                <div class="flex items-center justify-between p-2 border rounded ${lab.is_active ? 'bg-white' : 'bg-red-50 opacity-60'}">
                    <span class="text-sm font-medium">${lab.name}</span>
                    <button onclick="toggleLab('${lab.id}', ${lab.is_active})" 
                        class="text-[10px] px-2 py-1 rounded border ${lab.is_active ? 'bg-gray-100 text-red-600 border-red-200' : 'bg-green-100 text-green-600 border-green-200'}">
                        ${lab.is_active ? 'Decommission' : 'Restore'}
                    </button>
                </div>
            `).join('');
        }

        async function toggleLab(id, currentStatus) {
            await supabase.from('labs').update({ is_active: !currentStatus }).eq('id', id);
            fetchLabs();
        }

        async function addNewLab() {
            const name = document.getElementById('new-lab-name').value;
            if (!name) return;

            // insert and show any errors so we can diagnose permission issues
            const { data, error } = await supabase.from('labs').insert([{ name: name }]);
            if (error) {
                console.error('insert failed', error);
                alert('Failed to add lab: ' + error.message);
                return;
            }

            document.getElementById('new-lab-name').value = '';
            fetchLabs();
        }

        initAdmin();
    </script>
</body>
</html>
