<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Glass</title>
    <link rel="stylesheet" href="mystyle.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <nav>
        <div class="nav-container">
            <h1 class="font-bold">Admin Portal</h1>
            <div class="flex gap-2">
                <button onclick="switchView('requests-section')" class="btn btn-admin text-xs">Requests</button>
                <button onclick="switchView('users-section')" class="btn btn-admin text-xs">Users</button>
                <button onclick="switchView('labs-section')" class="btn btn-admin text-xs">Labs</button>
                <button onclick="window.location.href='index.html'" class="btn btn-primary text-xs">Home</button>
                <button onclick="logoutUser()" class="btn btn-danger text-xs">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-6xl">
        <section id="requests-section" class="content-section active">
            <div class="card">
                <h2 class="text-xl font-bold mb-4">📥 Pending Requests</h2>
                <div class="filter-group">
                    <div class="flex-1"><label>Date</label><input type="date" id="filter-p-date" oninput="renderFiltered()"></div>
                    <div class="flex-1"><label>Lab</label><select id="filter-p-lab" onchange="renderFiltered()"></select></div>
                    <button onclick="clearFilter('p')" class="btn bg-gray-400 text-white text-xs">Clear</button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Details</th><th>User</th><th>Purpose</th><th class="text-right">Action</th></tr></thead>
                        <tbody id="pending-list"></tbody>
                    </table>
                </div>
            </div>

            <div class="card mt-6">
                <h2 class="text-xl font-bold mb-4">📚 History Archive</h2>
                <div class="filter-group">
                    <div class="flex-1"><label>Date</label><input type="date" id="filter-a-date" oninput="renderFiltered()"></div>
                    <div class="flex-1"><label>Lab</label><select id="filter-a-lab" onchange="renderFiltered()"></select></div>
                    <button onclick="clearFilter('a')" class="btn bg-gray-400 text-white text-xs">Clear</button>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead><tr><th>Details</th><th>User</th><th>Status</th><th class="text-right">Action</th></tr></thead>
                        <tbody id="history-list"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="users-section" class="content-section">
            <div class="card">
                <h2 class="text-xl font-bold mb-4">Register User</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-2 mb-6">
                    <input id="u-name" placeholder="Name">
                    <input id="u-email" placeholder="Email">
                    <input id="u-pass" type="password" placeholder="Password">
                    <button onclick="addUser()" class="btn btn-primary">Add User</button>
                </div>
                <div class="table-responsive"><table class="w-full"><thead><tr><th>Name</th><th>Email</th><th class="text-right">Action</th></tr></thead><tbody id="u-list"></tbody></table></div>
            </div>
        </section>

        <section id="labs-section" class="content-section">
            <div class="card">
                <h2 class="text-xl font-bold mb-4">Manage Labs</h2>
                <div class="flex gap-2 mb-6">
                    <input id="l-name" placeholder="Lab Name">
                    <button onclick="addLab()" class="btn btn-primary">Add Lab</button>
                </div>
                <div class="table-responsive"><table class="w-full"><thead><tr><th>Lab Name</th><th class="text-right">Action</th></tr></thead><tbody id="l-list"></tbody></table></div>
            </div>
        </section>
    </main>

    <script>
        const SUPABASE_URL = 'https://naptcmmrazrvpukrefxe.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_sqns8O_0Wjdo-oW46m83Pw_fulPTNhe';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let bookingsCache = [];

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if(!user?.is_admin) window.location.href = 'index.html';
            init();
        };

        async function init() { await fetchLabs(); fetchUsers(); fetchBookings(); }

         async function fetchLabs() {
            const { data } = await supabaseClient.from('labs').select('*').order('name');
            const pSel = document.getElementById('filter-p-lab'), aSel = document.getElementById('filter-a-lab');
            pSel.innerHTML = aSel.innerHTML = '<option value="all">All Labs</option>';
            document.getElementById('l-list').innerHTML = data.map(l => {
                const opt = `<option value="${l.name}">${l.name}</option>`;
                pSel.innerHTML += opt; aSel.innerHTML += opt;
                return `<tr><td data-label="Lab">${l.name}</td><td class="text-right"><button onclick="delLab('${l.id}')" class="text-red-500 font-bold">Delete</button></td></tr>`;
            }).join('');
        }

        async function fetchBookings() {
            const { data } = await supabaseClient.from('bookings').select('*, labs(name)').order('booking_date', {ascending:false});
            bookingsCache = data || [];
            renderFiltered();
        }

        function renderFiltered() {
            const pD = document.getElementById('filter-p-date').value, pL = document.getElementById('filter-p-lab').value;
            const aD = document.getElementById('filter-a-date').value, aL = document.getElementById('filter-a-lab').value;

            const p = bookingsCache.filter(b => b.status === 'pending' && (!pD || b.booking_date === pD) && (pL === 'all' || b.labs?.name === pL));
            const h = bookingsCache.filter(b => b.status !== 'pending' && (!aD || b.booking_date === aD) && (aL === 'all' || b.labs?.name === aL));

            document.getElementById('pending-list').innerHTML = p.map(b => `
                <tr>
                    <td data-label="Details"><b>${b.booking_date}</b><br><small class="text-blue-600 font-bold">${b.labs?.name} | ${b.time_slot}</small></td>
                    <td data-label="User">${b.user_name}</td>
                    <td data-label="Purpose" class="text-xs italic text-gray-400">${b.purpose || '-'}</td>
                    <td data-label="Action" class="text-right">
                        <button onclick="upStat('${b.id}','approved')" class="btn bg-green-500 text-white text-[10px] px-2 py-1 mr-1">Approve</button>
                        <button onclick="upStat('${b.id}','rejected')" class="btn bg-red-500 text-white text-[10px] px-2 py-1">Reject</button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="4" class="text-center p-8 opacity-50">Empty</td></tr>';

            document.getElementById('history-list').innerHTML = h.map(b => `
                <tr>
                    <td data-label="Details">${b.booking_date}<br><small>${b.labs?.name}</small></td>
                    <td data-label="User">${b.user_name}</td>
                    <td data-label="Status"><span class="badge ${b.status === 'approved' ? 'status-confirmed' : 'status-occupied'}">${b.status}</span></td>
                    <td data-label="Action" class="text-right"><button onclick="upStat('${b.id}','pending')" class="text-blue-500 text-xs font-bold underline">Reset</button></td>
                </tr>
            `).join('');
        }

        async function upStat(id, status) { await supabaseClient.from('bookings').update({ status }).eq('id', id); fetchBookings(); }
        
        async function fetchUsers() {
            const { data } = await supabaseClient.from('users').select('*').order('name');
            document.getElementById('u-list').innerHTML = data.map(u => `<tr><td data-label="Name">${u.name} ${u.is_admin ? '⭐' : ''}</td><td data-label="Email">${u.email}</td><td data-label="Action" class="text-right"><button onclick="delUser('${u.id}')" class="text-red-500">Remove</button></td></tr>`).join('');
        }

        async function addUser() {
            const name = document.getElementById('u-name').value, email = document.getElementById('u-email').value, pass = document.getElementById('u-pass').value;
            const msgUint8 = new TextEncoder().encode(pass);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashed = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
            await supabaseClient.from('users').insert([{ name, email, password: hashed, is_admin: false }]);
            fetchUsers();
        }

        async function addLab() { await supabaseClient.from('labs').insert([{ name: document.getElementById('l-name').value }]); fetchLabs(); }
        async function delLab(id) { if(confirm('Del?')){ await supabaseClient.from('labs').delete().eq('id', id); fetchLabs(); } }
        async function delUser(id) { if(confirm('Del?')){ await supabaseClient.from('users').delete().eq('id', id); fetchUsers(); } }
        function clearFilter(t) { document.getElementById(`filter-${t}-date`).value = ''; document.getElementById(`filter-${t}-lab`).value = 'all'; renderFiltered(); }
        function switchView(id) { document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function logoutUser() { localStorage.clear(); window.location.reload(); }
    </script>
</body>
</html>
