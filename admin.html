<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal</title>

<link rel="stylesheet" href="mystyle.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

<nav>
    <div class="nav-container">
        <h1 class="font-bold">Admin Portal</h1>
        <button onclick="logoutAdmin()" class="btn btn-danger text-xs">Logout</button>
    </div>
</nav>

<main class="container mx-auto p-4 max-w-6xl">
    <section class="content-section active">
        <div class="card">
            <h2 class="text-xl font-bold mb-4">Admin Dashboard</h2>
            <p>Welcome, Admin.</p>
        </div>
    </section>
</main>

<script>
const SUPABASE_URL = 'https://naptcmmrazrvpukrefxe.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* 🔐 VERIFY ADMIN FROM DATABASE */
window.onload = async () => {
    const user = JSON.parse(localStorage.getItem('currentUser'));

    if (!user) {
        window.location.href = 'index.html';
        return;
    }

    const { data } = await supabaseClient
        .from('users')
        .select('is_admin')
        .eq('id', user.id)
        .single();

    if (!data || !data.is_admin) {
        localStorage.removeItem('currentUser');
        window.location.href = 'index.html';
        return;
    }
};

function logoutAdmin() {
    localStorage.removeItem('currentUser');
    window.location.href = 'index.html';
}
</script>

</body>
</html>
